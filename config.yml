---
base_image: ubuntu:noble

labels:
  maintainer: "Maciej Rachuna <rachuna.maciej@gmail.com>"
  version: "1.0.0"
  image_source: "https://gitlab.com/pl.rachuna-net/containers/gohugo"

env:
  DEBIAN_FRONTEND: noninteractive
  TF_IN_AUTOMATION: "true"
  LANG: C.UTF-8

before_build_commands:
  - curl -sL --output ./hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.148.2/hugo_extended_0.148.2_linux-amd64.deb

packages:
  - bash
  - curl
  - git
  - gnupg2
  - jq
  - openssh-client
  - ca-certificates
  - golang-go
  - nodejs
  - npm

custom_repos: []

extra_commands:
  - chmod 777 /opt/scripts
  - chmod 777 /opt/scripts/*
  - dpkg -i /tmp/hugo.deb
  - hugo version
  - npm install --global postcss postcss-cli autoprefixer
  - rm -fr /tmp/hugo.deb

copy:
  - source: scripts/
    destination: /opt/scripts/
  - source: hugo.deb
    destination: /tmp/hugo.deb

user:
  name: nonroot
  shell: /bin/bash
  home: /home/nonroot
  chown: /opt/scripts/

entrypoint: "/opt/scripts/entrypoint.bash"
cmd: "/bin/bash"
